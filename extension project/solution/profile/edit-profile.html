<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Edit Profile — Workday Autofill</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #f8f9fa;
        min-height: 100vh;
      }
      .header {
        background: #1a73e8;
        color: white;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header img {
        width: 24px;
        height: 24px;
        object-fit: contain;
        flex-shrink: 0;
      }
      .header-title {
        font-size: 18px;
        font-weight: 600;
      }
      .container {
        max-width: 560px;
        margin: 32px auto;
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }
      .form-header {
        padding: 20px 24px 16px;
        border-bottom: 1px solid #dadce0;
      }
      .form-header h2 {
        font-size: 16px;
        font-weight: 600;
        color: #202124;
      }
      .form-header p {
        font-size: 13px;
        color: #5f6368;
        margin-top: 4px;
        line-height: 1.5;
      }
      .form-body {
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-row.full {
        grid-template-columns: 1fr;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      label {
        font-size: 13px;
        font-weight: 500;
        color: #5f6368;
      }
      .optional {
        font-weight: 400;
        color: #9aa0a6;
      }
      input {
        padding: 10px 12px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        font-size: 14px;
        color: #202124;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input:focus {
        border-color: #1a73e8;
        box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
      }
      .form-footer {
        padding: 16px 24px;
        border-top: 1px solid #dadce0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .status {
        font-size: 13px;
        color: #5f6368;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .status.visible {
        opacity: 1;
      }
      .status.success {
        color: #188038;
      }
      .status.error {
        color: #c5221f;
      }
      .save-btn {
        padding: 10px 24px;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      .save-btn:hover {
        background: #1557b0;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img id="logo" alt="" />
      <span class="header-title">Workday Autofill — Edit Profile</span>
    </div>
    <div class="container">
      <div class="form-header">
        <h2>Your Profile</h2>
        <p>This information will be used to autofill Workday job applications. Data is saved to your Chrome account and syncs across devices.</p>
      </div>
      <div class="form-body">
        <div class="form-row">
          <div class="field">
            <label for="firstName">First Name</label>
            <input id="firstName" type="text" placeholder="First name" />
          </div>
          <div class="field">
            <label for="lastName">Last Name</label>
            <input id="lastName" type="text" placeholder="Last name" />
          </div>
        </div>
        <div class="form-row full">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="your@email.com" />
          </div>
        </div>
        <div class="form-row full">
          <div class="field">
            <label for="phoneNumber">Phone Number</label>
            <input id="phoneNumber" type="tel" placeholder="3051234567" />
          </div>
        <div class="form-row full">
          <div class="field">
            <label for="phoneType">Phone Number</label>
            <input id="phoneType" type="text" placeholder="Mobile" value="Mobile"/>
          </div>
        </div>
        <div class="form-row full">
          <div class="field">
            <label for="addressLine1">Address Line 1</label>
            <input id="addressLine1" type="text" placeholder="123 Main Street" />
          </div>
        </div>
        <div class="form-row full">
          <div class="field">
            <label for="addressLine2">Address Line 2 <span class="optional">(optional)</span></label>
            <input id="addressLine2" type="text" placeholder="Apt, Suite, etc." />
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label for="city">City</label>
            <input id="city" type="text" placeholder="Miami" />
          </div>
          <div class="field">
            <label for="state">State</label>
            <input id="state" type="text" placeholder="Florida" />
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label for="zipCode">Zip Code</label>
            <input id="zipCode" type="text" placeholder="33199" />
          </div>
          <div class="field">
            <label for="country">Country</label>
            <input id="country" type="text" placeholder="United States of America" />
          </div>
        </div>
      </div>
      <div class="form-footer">
        <span class="status" id="status"></span>
        <button class="save-btn" id="save-btn">Save Profile</button>
      </div>
    </div>
    <script src="edit-profile.js"></script>
  </body>
</html>
